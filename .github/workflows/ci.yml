name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install copier
        run: pipx install copier
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
